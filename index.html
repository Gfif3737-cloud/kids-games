<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>МетроПомощник — помощь в метро</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a1f2e;
            color: #eef4ff;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 550px;
            width: 100%;
            background: rgba(18, 30, 41, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 24px;
        }

        .button-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .action-btn {
            border: none;
            padding: 16px 12px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            background: #1e3a4d;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 0 #0b1c26;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0b1c26;
        }

        .btn-lost { background: #c44536; box-shadow: 0 5px 0 #8a2e22; }
        .btn-route { background: #2c6e9e; box-shadow: 0 5px 0 #1c4a6e; }
        .btn-assist { background: #2b7a5c; box-shadow: 0 5px 0 #1b543f; }

        .result-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 32px;
            padding: 20px;
            margin-top: 16px;
            border-left: 5px solid #ffb347;
            display: none;
        }

        .result-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #ffb34760;
            padding-bottom: 6px;
        }

        .info-text {
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .location-detail {
            background: #0f212e;
            padding: 10px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            margin: 8px 0;
        }

        .steps-list {
            padding-left: 20px;
            margin: 10px 0;
        }

        .steps-list li {
            margin: 6px 0;
        }

        .small-note {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,200,0.3);
            border-radius: 50%;
            border-top-color: #ffd966;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.6;
        }

        /* Чат */
        .chat-section {
            margin-top: 20px;
            background: #0a1a24;
            border-radius: 28px;
            padding: 12px;
            border: 1px solid #2c5a6e;
        }

        .chat-messages {
            max-height: 200px;
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 90%;
            word-wrap: break-word;
            font-size: 0.85rem;
        }

        .msg-user {
            background: #2c6e9e;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            background: #1e3a2f;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #d4f1e6;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            background: #1e2e3a;
            color: white;
            font-size: 0.85rem;
        }

        .chat-send {
            background: #ffb347;
            border: none;
            border-radius: 40px;
            padding: 0 16px;
            font-weight: bold;
            color: #1a2a2a;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>🚇 МетроПомощник</h1>
    <div class="sub">Московский метрополитен | помощь рядом</div>

    <div class="button-panel">
        <button class="action-btn btn-lost" id="lostBtn">🔍 Я потерялся(лась)</button>
        <button class="action-btn btn-route" id="navigateBtn">🧭 Я не знаю, куда идти</button>
        <button class="action-btn btn-assist" id="assistBtn">♿ Помочь дойти (маломобильные)</button>
    </div>

    <div id="resultCard" class="result-card">
        <div class="result-title" id="resultIcon">📌</div>
        <div id="resultText"></div>
    </div>

    <!-- ИИ-чат -->
    <div class="chat-section">
        <div style="font-weight:bold; margin-bottom: 6px;">💬 ИИ-навигатор</div>
        <div id="chatMessages" class="chat-messages">
            <div class="msg msg-ai">👋 Привет! Спроси меня: «как выйти?», «где переход?» или «помоги дойти до вокзала».</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Напишите вопрос...">
            <button id="chatSendBtn" class="chat-send">➤</button>
        </div>
    </div>
    <footer>📍 Геопозиция работает через Wi-Fi метро. Нажмите кнопку — получите инструкцию.</footer>
</div>

<script>
    // ========== БАЗА СТАНЦИЙ МЕТРО ==========
    const stationsDB = [
        { name: "Комсомольская", line: "Кольцевая / Сокольническая", lat: 55.7753, lon: 37.6556, exits: ["Выход к Ленинградскому вокзалу", "Выход к Ярославскому вокзалу", "Выход к Казанскому вокзалу"], transitions: ["Курская", "Площадь Революции"], railwayStations: ["Ленинградский вокзал", "Ярославский вокзал", "Казанский вокзал"] },
        { name: "Курская", line: "Кольцевая / Арбатско-Покровская", lat: 55.7579, lon: 37.6580, exits: ["Выход на Курский вокзал", "Выход на ул. Земляной Вал"], transitions: ["Чкаловская", "Площадь Ильича"], railwayStations: ["Курский вокзал"] },
        { name: "Киевская", line: "Кольцевая / Арбатско-Покровская", lat: 55.7436, lon: 37.5665, exits: ["Выход к Киевскому вокзалу", "Выход на пл. Европы"], transitions: ["Смоленская"], railwayStations: ["Киевский вокзал"] },
        { name: "Белорусская", line: "Кольцевая / Замоскворецкая", lat: 55.7766, lon: 37.5832, exits: ["Выход к Белорусскому вокзалу"], transitions: ["Маяковская"], railwayStations: ["Белорусский вокзал"] },
        { name: "Павелецкая", line: "Кольцевая / Замоскворецкая", lat: 55.7308, lon: 37.6376, exits: ["Выход к Павелецкому вокзалу"], transitions: ["Новокузнецкая"], railwayStations: ["Павелецкий вокзал"] },
        { name: "Савеловская", line: "Серпуховско-Тимирязевская", lat: 55.7934, lon: 37.5884, exits: ["Выход к Савеловскому вокзалу"], transitions: ["Динамо"], railwayStations: ["Савеловский вокзал"] },
        { name: "Охотный Ряд", line: "Сокольническая", lat: 55.7577, lon: 37.6155, exits: ["Выход к Манежной площади", "Выход к Большому театру"], transitions: ["Театральная", "Площадь Революции"], railwayStations: [] },
        { name: "Площадь Революции", line: "Арбатско-Покровская", lat: 55.7568, lon: 37.6213, exits: ["Выход к Красной площади"], transitions: ["Охотный Ряд", "Театральная"], railwayStations: [] },
        { name: "Маяковская", line: "Замоскворецкая", lat: 55.7702, lon: 37.5959, exits: ["Выход на Тверскую улицу"], transitions: ["Белорусская"], railwayStations: [] }
    ];

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function findNearestStation(lat, lon) {
        let nearest = null, minDist = Infinity;
        for (let st of stationsDB) {
            const d = getDistance(lat, lon, st.lat, st.lon);
            if (d < minDist) { minDist = d; nearest = st; }
        }
        return { station: nearest, distanceKm: minDist };
    }

    function getCurrentPosition() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) reject(new Error("Геолокация не поддерживается"));
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 15000 });
        });
    }

    const resultCard = document.getElementById("resultCard");
    const resultIcon = document.getElementById("resultIcon");
    const resultText = document.getElementById("resultText");

    function showResult(icon, title, content) {
        resultCard.style.display = "block";
        resultIcon.innerHTML = icon;
        resultText.innerHTML = `<div style="font-weight:bold; margin-bottom:6px;">${title}</div>${content}`;
        resultCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function showLoader(icon, msg) {
        resultCard.style.display = "block";
        resultIcon.innerHTML = icon;
        resultText.innerHTML = `<div class="loader" style="margin:8px auto;"></div><div style="margin-top:6px;">${msg}</div>`;
    }

    // ========== КНОПКА 1: ПОТЕРЯЛСЯ ==========
    async function handleLost() {
        showLoader("🔍", "Определяем местоположение...");
        try {
            const pos = await getCurrentPosition();
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const nearest = findNearestStation(lat, lon);
            if (!nearest.station) throw new Error("Станция не найдена");
            const st = nearest.station;
            const dist = (nearest.distanceKm * 1000).toFixed(0);
            let content = `<div class="info-text">📍 Ближайшая станция: <strong>${st.name}</strong> (${st.line})<br>📏 Расстояние: ~${dist} метров</div>`;
            content += `<div class="location-detail">🗺️ Координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}</div>`;
            content += `<div class="info-text">👮‍♂️ <strong>Что делать:</strong><br>• Оставайся на месте или отойди к стене<br>• Найди сотрудника в синей форме<br>• Покажи ему экран телефона</div>`;
            showResult("🆘 ПОМОЩЬ", "Ваше местоположение", content);
        } catch(e) {
            showResult("⚠️", "Ошибка", `<div>❌ Не удалось определить геолокацию. Проверьте доступ к местоположению.</div>`);
        }
    }

    // ========== КНОПКА 2: МАРШРУТ ==========
    async function handleRoute() {
        showLoader("🧭", "Определяем местоположение...");
        try {
            const pos = await getCurrentPosition();
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const nearest = findNearestStation(lat, lon);
            if (!nearest.station) throw new Error("Станция не найдена");
            const st = nearest.station;
            
            let destinations = [];
            if (st.exits) destinations.push(...st.exits.map(e => ({type:"Выход", name:e})));
            if (st.transitions) destinations.push(...st.transitions.map(t => ({type:"Переход", name:t})));
            if (st.railwayStations) destinations.push(...st.railwayStations.map(r => ({type:"Вокзал", name:r})));
            if (destinations.length === 0) destinations.push({type:"Выход", name:"Центральный выход"});
            
            let menu = destinations.map((d,i)=>`${i+1}. ${d.type}: ${d.name}`).join("\n");
            let choice = prompt(`Вы на станции: ${st.name}\nКуда нужно дойти?\n${menu}\n\nВведите номер:`);
            if (!choice) return;
            
            let idx = parseInt(choice);
            let target = destinations[idx-1] || destinations[0];
            
            let steps = "";
            if (target.type === "Выход") steps = `1. Иди к указателю «${target.name}»\n2. Поднимись по эскалатору\n3. Пройди через турникеты\n4. Ты на улице`;
            else if (target.type === "Переход") steps = `1. Следуй по переходу на станцию «${target.name}»\n2. Иди по коридору 2-5 минут\n3. Ты на нужной станции`;
            else steps = `1. Ищи указатели к ${target.name}\n2. Следуй по ним\n3. Выход к вокзалу будет прямо`;
            
            showResult("🗺️", "Маршрут построен", `<div class="info-text"><strong>Откуда:</strong> ${st.name}<br><strong>Куда:</strong> ${target.type} «${target.name}»</div><div class="steps-list">${steps.replace(/\n/g, '<br>')}</div>`);
        } catch(e) {
            showResult("⚠️", "Ошибка", `<div>❌ ${e.message}</div>`);
        }
    }

    // ========== КНОПКА 3: ПОМОЩЬ МАЛОМОБИЛЬНЫМ ==========
    async function handleAssist() {
        showLoader("♿", "Вызов службы помощи...");
        try {
            const pos = await getCurrentPosition();
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const nearest = findNearestStation(lat, lon);
            const stationName = nearest.station ? nearest.station.name : "неизвестная станция";
            let content = `<div class="info-text">✅ Служба помощи маломобильным уведомлена</div>`;
            content += `<div class="location-detail">📍 Координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>Станция: ${stationName}</div>`;
            content += `<div class="info-text">👨‍🦽 Сотрудники подойдут в течение 10-15 минут<br>📞 Горячая линия ЦОМП: +7 (495) 539-54-54</div>`;
            showResult("♿ СОПРОВОЖДЕНИЕ", "Помощь уже в пути", content);
        } catch(e) {
            showResult("⚠️", "Ошибка", `<div>❌ Не удалось отправить геолокацию</div>`);
        }
    }

    // ========== ИИ-ЧАТ ==========
    let currentStation = null;
    async function updateStation() {
        try {
            const pos = await getCurrentPosition();
            const nearest = findNearestStation(pos.coords.latitude, pos.coords.longitude);
            currentStation = nearest.station;
        } catch(e) { currentStation = null; }
    }
    updateStation();

    function aiResponse(question) {
        const q = question.toLowerCase();
        if (!currentStation) return "🌐 Не удалось определить вашу станцию. Включите геолокацию или подключитесь к Wi-Fi метро.";
        if (q.includes("выход") || q.includes("выйти") || q.includes("на улицу")) {
            let exits = currentStation.exits?.slice(0,2).join(" или ") || "главный вестибюль";
            return `🚪 Вы на станции «${currentStation.name}». Идите к указателям «${exits}». Поднимитесь по эскалатору — вы на улице.`;
        }
        if (q.includes("переход") || q.includes("перейти") || q.includes("другую линию")) {
            let trans = currentStation.transitions?.join(", ") || "рядом нет прямого перехода";
            return `🔄 Со станции «${currentStation.name}» можно перейти на: ${trans}. Ищите оранжевые указатели.`;
        }
        if (q.includes("вокзал")) {
            if (currentStation.railwayStations?.length) {
                return `🚉 У станции «${currentStation.name}» есть выход к ${currentStation.railwayStations.join(", ")}. Следуйте указателям с изображением поезда.`;
            } else {
                return `🗺️ На станции «${currentStation.name}» нет прямого выхода к вокзалу. Выйдите в город и посмотрите навигатор.`;
            }
        }
        return `🤖 Вы на станции «${currentStation.name}» (${currentStation.line}). Спросите меня: «как выйти?», «где переход?», «как пройти к вокзалу?».`;
    }

    function addMessage(text, isUser = false) {
        const container = document.getElementById("chatMessages");
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${isUser ? 'msg-user' : 'msg-ai'}`;
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        if (container.children.length > 20) container.removeChild(container.firstChild);
    }

    async function onChatSend() {
        const input = document.getElementById("chatInput");
        const question = input.value.trim();
        if (!question) return;
        addMessage(question, true);
        input.value = "";
        await updateStation();
        const answer = aiResponse(question);
        addMessage(answer, false);
    }

    // Привязка кнопок
    document.getElementById("lostBtn").addEventListener("click", handleLost);
    document.getElementById("navigateBtn").addEventListener("click", handleRoute);
    document.getElementById("assistBtn").addEventListener("click", handleAssist);
    document.getElementById("chatSendBtn").addEventListener("click", onChatSend);
    document.getElementById("chatInput").addEventListener("keypress", (e) => { if(e.key === "Enter") onChatSend(); });
</script>
</body>
</html>
