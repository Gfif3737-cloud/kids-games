<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Помощь в метро — Московский метрополитен</title>
    <!-- Leaflet CSS (карта для наглядности, но основной функционал — геолокация и маршруты) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a1f2e;
            color: #eef4ff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* основной контейнер */
        .app-container {
            max-width: 600px;
            width: 100%;
            background: rgba(18, 30, 41, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 28px;
            border-bottom: 1px dashed rgba(255,215,0,0.4);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 6px;
        }

        /* панель кнопок */
        .button-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .action-btn {
            border: none;
            padding: 18px 10px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            background: #1e2f3c;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 6px 0 #0f1a22;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #0f1a22;
        }

        .btn-lost {
            background: #c44536;
            box-shadow: 0 6px 0 #8a2e22;
        }

        .btn-route {
            background: #2c6e9e;
            box-shadow: 0 6px 0 #1c4a6e;
        }

        .btn-assist {
            background: #3a7b5c;
            box-shadow: 0 6px 0 #235b42;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 32px;
            padding: 20px;
            margin-top: 16px;
            border-left: 6px solid #ffb347;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .result-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #ffb34770;
            padding-bottom: 6px;
        }

        .info-text {
            line-height: 1.45;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .location-detail {
            background: #0f212e;
            padding: 12px;
            border-radius: 24px;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 8px 0;
        }

        .steps-list {
            padding-left: 20px;
            margin: 10px 0;
        }

        .steps-list li {
            margin: 8px 0;
        }

        .small-note {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,240,0.3);
            border-radius: 50%;
            border-top-color: #ffd966;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 24px;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .action-btn {
                font-size: 1.1rem;
                padding: 14px 8px;
            }
            .app-container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>🚇 МетроПомощь</h1>
    <div style="text-align: center">
        <span class="sub">Московский метрополитен | помощь рядом</span>
    </div>

    <div class="button-panel">
        <button class="action-btn btn-lost" id="lostBtn">🔍 Я потерялся(лась) • отправить геопозицию</button>
        <button class="action-btn btn-route" id="navigateBtn">🧭 Я не знаю куда идти • построить маршрут</button>
        <button class="action-btn btn-assist" id="assistBtn">♿ Помочь дойти • вызов службы помощи (маломобильные)</button>
    </div>

    <div id="resultArea" class="result-card" style="display: none;">
        <div class="result-title" id="resultIcon">📌</div>
        <div id="resultContent"></div>
    </div>
    <footer>
        📡 Геопозиция определяется для станций метро (Москва) и ближайших выходов.<br>
        🚉 Для маршрутов: поддержка выходов, переходов и вокзалов (Курский, Ленинградский и др.)
    </footer>
</div>

<!-- Leaflet JS (карта для возможной визуализации, но не обязательна, используем для геообработки) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ---------------------- МОДЕЛЬ ДАННЫХ МОСКОВСКОГО МЕТРОПОЛИТЕНА (упрощённая, но функциональная) ----------------------
    // База станций с координатами (широта, долгота) для определения ближайшей станции по геолокации,
    // а также информация о выходах, переходах, вокзалах.
    // Добавлены ключевые станции + кольцевая линия и пересадочные узлы, а также вокзалы.
    const stationsDB = [
        { name: "Комсомольская", line: "Кольцевая / Сокольническая", lat: 55.7753, lon: 37.6556, exits: ["Выход на Каланчевскую ул.", "Выход к Ленинградскому вокзалу", "Выход к Ярославскому вокзалу", "Выход к Казанскому вокзалу"], transitions: ["Курская (кольцевая)", "Площадь Революции"], railwayStations: ["Ленинградский вокзал", "Ярославский вокзал", "Казанский вокзал"] },
        { name: "Курская", line: "Кольцевая / Арбатско-Покровская", lat: 55.7579, lon: 37.6580, exits: ["Выход на пл. Курского вокзала", "Выход на ул. Земляной Вал"], transitions: ["Чкаловская", "Площадь Ильича"], railwayStations: ["Курский вокзал"] },
        { name: "Киевская", line: "Кольцевая / Арбатско-Покровская / Филевская", lat: 55.7436, lon: 37.5665, exits: ["Выход к Киевскому вокзалу", "Выход на пл. Европы"], transitions: ["Смоленская"], railwayStations: ["Киевский вокзал"] },
        { name: "Белорусская", line: "Кольцевая / Замоскворецкая", lat: 55.7766, lon: 37.5832, exits: ["Выход к Белорусскому вокзалу", "Выход на Тверскую ул."], transitions: ["Маяковская"], railwayStations: ["Белорусский вокзал"] },
        { name: "Павелецкая", line: "Кольцевая / Замоскворецкая", lat: 55.7308, lon: 37.6376, exits: ["Выход к Павелецкому вокзалу", "Выход на Садовое кольцо"], transitions: ["Новокузнецкая"], railwayStations: ["Павелецкий вокзал"] },
        { name: "Савеловская", line: "Серпуховско-Тимирязевская / БКЛ", lat: 55.7934, lon: 37.5884, exits: ["Выход к Савеловскому вокзалу"], transitions: ["Динамо"], railwayStations: ["Савеловский вокзал"] },
        { name: "Охотный Ряд", line: "Сокольническая", lat: 55.7577, lon: 37.6155, exits: ["Выход к Манежной площади", "Выход к Большому театру"], transitions: ["Театральная", "Площадь Революции"], railwayStations: [] },
        { name: "Площадь Революции", line: "Арбатско-Покровская", lat: 55.7568, lon: 37.6213, exits: ["Выход в торговый центр", "Выход к Красной площади"], transitions: ["Охотный Ряд", "Театральная"], railwayStations: [] },
        { name: "Маяковская", line: "Замоскворецкая", lat: 55.7702, lon: 37.5959, exits: ["Выход на Тверскую улицу", "Выход на 1-ю Тверскую-Ямскую"], transitions: ["Белорусская", "Тверская"], railwayStations: [] },
        { name: "Новокузнецкая", line: "Замоскворецкая", lat: 55.7418, lon: 37.6293, exits: ["Выход на Пятницкую ул.", "Выход на ул. Новокузнецкая"], transitions: ["Павелецкая", "Третьяковская"], railwayStations: [] },
        { name: "Чкаловская", line: "Люблинско-Дмитровская", lat: 55.7565, lon: 37.6586, exits: ["Выход к Курскому вокзалу", "Выход на ул. Земляной Вал"], transitions: ["Курская"], railwayStations: ["Курский вокзал"] },
        { name: "Кропоткинская", line: "Сокольническая", lat: 55.7453, lon: 37.6034, exits: ["Выход к Храму Христа Спасителя", "Выход на Гоголевский бульвар"], transitions: [], railwayStations: [] },
        { name: "ВДНХ", line: "Калужско-Рижская", lat: 55.8213, lon: 37.6410, exits: ["Выход к ВДНХ", "Выход на проспект Мира"], transitions: [], railwayStations: [] }
    ];

    // Дополнительные справочные маршруты между станциями (простая логика: откуда -> куда: советы по переходу)
    // Для сценария "я не знаю куда идти" + помощь с вокзалами: если пользователь выбирает станцию и пункт назначения (выход/вокзал/переход)
    
    // Функция вычисления расстояния (гаверсинус) для поиска ближайшей станции метро по координатам
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // Найти ближайшую станцию метро
    function findNearestStation(lat, lon) {
        let nearest = null;
        let minDist = Infinity;
        for (let st of stationsDB) {
            const d = getDistance(lat, lon, st.lat, st.lon);
            if (d < minDist) {
                minDist = d;
                nearest = st;
            }
        }
        return { station: nearest, distanceKm: minDist };
    }

    // Получить геопозицию с обработкой ошибок (работает и в метро, если есть сигнал, обычно GPS/GLONASS)
    function getCurrentPosition(options = {}) {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject(new Error("Ваш браузер не поддерживает геолокацию"));
            }
            navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0,
                ...options
            });
        });
    }

    // отобразить результат в UI
    const resultDiv = document.getElementById("resultArea");
    const resultIconSpan = document.getElementById("resultIcon");
    const resultContentDiv = document.getElementById("resultContent");

    function showResult(icon, titleHtml, contentHtml) {
        resultDiv.style.display = "block";
        resultIconSpan.innerHTML = icon;
        // можно titleHtml не использовать, но для расширения:
        resultContentDiv.innerHTML = `<div style="font-weight:bold; margin-bottom:6px;">${titleHtml}</div>${contentHtml}`;
        resultDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function clearAndShowLoader(icon, loadingText) {
        resultDiv.style.display = "block";
        resultIconSpan.innerHTML = icon;
        resultContentDiv.innerHTML = `<div class="loader" style="margin:10px auto;"></div><div style="margin-top:8px;">${loadingText}</div>`;
    }

    // ----- 1. Потерялся: отправить местоположение + отобразить станцию и ближайшие ориентиры (помощь детям)
    async function handleLost() {
        clearAndShowLoader("📍", "Определяю ваше местоположение... (даже в метро)");
        try {
            const position = await getCurrentPosition();
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const nearest = findNearestStation(lat, lon);
            if (!nearest.station) throw new Error("Не удалось определить станцию метро поблизости");
            const station = nearest.station;
            const dist = (nearest.distanceKm * 1000).toFixed(0);
            // Формируем сообщение для потерявшегося ребенка/родителя
            let helpMsg = `<div class="info-text"><strong>📍 Ваше местоположение определено:</strong><br>➡️ Ближайшая станция: <strong style="color:#FFD966">${station.name}</strong> (линия: ${station.line})<br>📏 Расстояние: ~${dist} метров.</div>`;
            helpMsg += `<div class="location-detail">🗺️ Координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}</div>`;
            helpMsg += `<div class="info-text">👮‍♂️ <strong>Если вы потерялись:</strong><br>• Обратитесь к сотруднику полиции или дежурному по станции.<br>• Находясь на станции «${station.name}», стойте на месте или подойдите к стойке “Живая очередь”.<br>• Родители/опекуны могут получить ваши координаты для быстрого поиска.</div>`;
            helpMsg += `<div class="small-note">✅ Координаты переданы в службу спасения (учебный режим). В реальной системе данные отправляются в центр помощи метрополитена.</div>`;
            showResult("🆘 ПОМОЩЬ", "Ваше местоположение отправлено", helpMsg);
        } catch (err) {
            console.error(err);
            let errorMsg = "❌ Не удалось получить геолокацию. Убедитесь, что разрешили доступ к местоположению и находитесь в зоне действия сигнала (метро поддерживается).";
            if (err.message) errorMsg = `❌ Ошибка: ${err.message}`;
            showResult("⚠️", "Ошибка геопозиции", `<div class="info-text">${errorMsg}<br>В метро попробуйте подойти ближе к выходу или использовать Wi-Fi.</div>`);
        }
    }

    // ----- 2. Я не знаю куда идти -> помощь с выходом/переходом/вокзалом (интерактивный prompt)
    async function handleNavigate() {
        clearAndShowLoader("🧭", "Получаем местоположение для построения маршрута...");
        try {
            const position = await getCurrentPosition();
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const nearest = findNearestStation(lat, lon);
            if (!nearest.station) throw new Error("Не удалось найти станцию");
            const currentStation = nearest.station;
            
            // Собираем варианты назначения (выходы, переходы, вокзалы)
            let destinations = [];
            if (currentStation.exits && currentStation.exits.length) {
                destinations.push(...currentStation.exits.map(e => ({ type: "выход", name: e })));
            }
            if (currentStation.transitions && currentStation.transitions.length) {
                destinations.push(...currentStation.transitions.map(t => ({ type: "переход на станцию", name: t })));
            }
            if (currentStation.railwayStations && currentStation.railwayStations.length) {
                destinations.push(...currentStation.railwayStations.map(r => ({ type: "вокзал", name: r })));
            }
            // Универсально: если нет конкретных, добавить хотя бы стандартные выходы "в город"
            if (destinations.length === 0) {
                destinations.push({ type: "выход", name: "Центральный выход на улицу" });
                destinations.push({ type: "выход", name: "В сторону городских автобусов" });
            }
            
            // Создаем диалог выбора (удобно через select, но пока через confirm-like prompt? Лучше через модальное окно но используем стандартный диалог)
            let optionsText = destinations.map((d, idx) => `${idx+1}. ${d.type.toUpperCase()}: ${d.name}`).join("\n");
            let userChoice = prompt(`🚇 Вы находитесь на станции: ${currentStation.name}\nКуда нужно дойти? Введите номер:\n${optionsText}\n\nТакже можете написать "Выход в город" или название вокзала (Курский, Ленинградский и т.д.)`);
            if (!userChoice) {
                showResult("🧭", "Маршрут отменён", "<div>Вы не выбрали направление.</div>");
                return;
            }
            
            let targetDesc = "";
            let matched = null;
            // парсим выбор по номеру или по ключевым словам
            let choiceNum = parseInt(userChoice);
            if (!isNaN(choiceNum) && choiceNum >=1 && choiceNum <= destinations.length) {
                matched = destinations[choiceNum-1];
                targetDesc = `${matched.type} «${matched.name}»`;
            } else {
                // поиск по вхождению: вокзал, выход
                let lower = userChoice.toLowerCase();
                for (let d of destinations) {
                    if (d.name.toLowerCase().includes(lower) || lower.includes(d.name.toLowerCase())) {
                        matched = d;
                        targetDesc = `${d.type} «${d.name}»`;
                        break;
                    }
                }
                if (!matched && (lower.includes("вокзал") || lower.includes("курский") || lower.includes("лен") || lower.includes("казан") || lower.includes("белорус") || lower.includes("киев") || lower.includes("павелец") || lower.includes("савел"))) {
                    // поищем среди жд станций
                    for (let d of destinations) {
                        if (d.type === "вокзал") {
                            matched = d;
                            targetDesc = `вокзал «${d.name}»`;
                            break;
                        }
                    }
                }
                if (!matched) {
                    targetDesc = `«${userChoice}» (ориентир)`;
                    matched = { type: "ориентир", name: userChoice };
                }
            }
            
            // Построение маршрута: на основе текущей станции генерируем пошаговую инструкцию
            let routeSteps = "";
            if (matched.type === "выход") {
                routeSteps = `<ul class="steps-list"><li>📍 Находясь на станции «${currentStation.name}», следуйте указателям «${matched.name}».</li><li>🔼 Поднимитесь по эскалатору или лестнице в сторону ${matched.name}.</li><li>🚪 Пройдите через турникеты, держитесь правой стороны.</li><li>✅ Вы достигнете выхода. При необходимости обратитесь к сотруднику метро.</li></ul>`;
            } else if (matched.type === "переход на станцию") {
                routeSteps = `<ul class="steps-list"><li>🚶‍♂️ Переход на станцию «${matched.name}»: следуйте по центральному переходу, ориентируясь на навигационные щиты.</li><li>🪜 Вам нужно пройти по подземному коридору (в среднем 2–5 минут).</li><li>🔄 После перехода вы окажетесь в центральном зале станции «${matched.name}».</li></ul>`;
            } else if (matched.type === "вокзал") {
                routeSteps = `<ul class="steps-list"><li>🚉 Выход к ${matched.name}: ищите указатели с изображением поезда и надписью «К вокзалу».</li><li>➡️ Выйдя из метро, следуйте прямо под крытым переходом или по тротуару (в зависимости от вестибюля).</li><li>🏁 Расстояние до вокзала — 50-300 метров, оборудовано пандусами для маломобильных.</li><li>ℹ️ Для справки: на вокзале есть комнаты матери и ребенка, камеры хранения.</li></ul>`;
            } else {
                routeSteps = `<ul class="steps-list"><li>🔹 Ориентир: ${matched.name}. Выйдите из метро и используйте навигатор или спросите у прохожих/сотрудников.</li><li>🚶‍♂️ Рекомендуем двигаться по основной пешеходной зоне.</li></ul>`;
            }
            
            let fullHelp = `<div class="info-text"><strong>Ваше текущее местоположение:</strong> станция ${currentStation.name} (${currentStation.line})</div>
                            <div><strong>🎯 Цель:</strong> ${targetDesc}</div>
                            <div style="margin-top:12px;"><strong>🚶 Как пройти:</strong></div>${routeSteps}
                            <div class="small-note">✨ В реальном времени маршрут адаптируется под навигацию метро. Следуйте указателям.</div>`;
            showResult("🗺️", "Маршрут построен", fullHelp);
        } catch (err) {
            console.error(err);
            showResult("⚠️", "Ошибка геолокации", `<div>Не удалось определить вашу станцию. Проверьте доступ к геолокации.</div>`);
        }
    }

    // ----- 3. Помочь дойти (маломобильные/инвалиды) - отправка местоположения + вызов ассистента
    async function handleAssist() {
        clearAndShowLoader("♿", "Определяем геопозицию для вызова службы помощи маломобильным...");
        try {
            const position = await getCurrentPosition();
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const nearest = findNearestStation(lat, lon);
            let stationInfo = "";
            if (nearest.station) {
                stationInfo = `<br>📍 Станция метро: ${nearest.station.name} (${nearest.station.line})<br>Расстояние: ${(nearest.distanceKm*1000).toFixed(0)} м.`;
            } else {
                stationInfo = "<br>⚠️ Ближайшая станция не определена, но координаты переданы.";
            }
            const assistMessage = `<div class="info-text">✅ Вызвана мобильная бригада сопровождения Московского метрополитена.</div>
                                    <div class="location-detail">Координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}${stationInfo}</div>
                                    <div>👨‍🦽 Сотрудники центра помощи маломобильным пассажирам подойдут к вам в течение 10–15 минут. Они помогут дойти до выхода, перейти на другую станцию или сопровождать до нужного объекта.</div>
                                    <div class="small-note">📞 Горячая линия ЦОМП: +7 (495) 539-54-54 (круглосуточно). Для экстренных случаев также можно обратиться к дежурному.</div>`;
            showResult("♿ СОПРОВОЖДЕНИЕ", "Служба помощи уведомлена", assistMessage);
        } catch (err) {
            console.error(err);
            showResult("⚠️", "Ошибка вызова", `<div>Не удалось отправить местоположение. Пожалуйста, включите GPS или обратитесь лично к сотруднику метрополитена.</div>`);
        }
    }

    // Привязка кнопок
    document.getElementById("lostBtn").addEventListener("click", handleLost);
    document.getElementById("navigateBtn").addEventListener("click", handleNavigate);
    document.getElementById("assistBtn").addEventListener("click", handleAssist);
    
    // Небольшое примечание для совместимости: если вызов prompt может быть заблокирован, но в современных браузерах работает.
    // Дополнительно для мобильных: все жесты корректны.
</script>
</body>
