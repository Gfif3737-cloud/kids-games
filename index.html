<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МетроПомощник</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a1f2e;
            color: white;
            padding: 20px;
            text-align: center;
            margin: 0;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .sub {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        button {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 15px auto;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-lost { background: #e74c3c; }
        .btn-route { background: #3498db; }
        .btn-assist { background: #2ecc71; }
        .result {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 20px;
            margin-top: 25px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            font-size: 16px;
            line-height: 1.5;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        footer {
            margin-top: 30px;
            font-size: 11px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>🚇 МетроПомощник</h1>
    <div class="sub">Московский метрополитен</div>

    <button class="btn-lost" id="btnLost">🔍 Я потерялся</button>
    <button class="btn-route" id="btnRoute">🧭 Я не знаю, куда идти</button>
    <button class="btn-assist" id="btnAssist">♿ Помочь дойти</button>

    <div id="result" class="result" style="display: none;"></div>

    <footer>📍 Нажмите кнопку — разрешите доступ к геолокации</footer>

    <script>
        // Простая база станций
        const stations = [
            { name: "Комсомольская", lat: 55.7753, lon: 37.6556, exits: "Ленинградский, Ярославский, Казанский вокзалы" },
            { name: "Курская", lat: 55.7579, lon: 37.6580, exits: "Курский вокзал, ул. Земляной Вал" },
            { name: "Киевская", lat: 55.7436, lon: 37.5665, exits: "Киевский вокзал, пл. Европы" },
            { name: "Белорусская", lat: 55.7766, lon: 37.5832, exits: "Белорусский вокзал" },
            { name: "Павелецкая", lat: 55.7308, lon: 37.6376, exits: "Павелецкий вокзал" },
            { name: "Охотный Ряд", lat: 55.7577, lon: 37.6155, exits: "Манежная площадь, Большой театр" }
        ];

        // Расчёт расстояния между координатами
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Поиск ближайшей станции
        function findNearestStation(lat, lon) {
            let nearest = null;
            let minDist = Infinity;
            for (let s of stations) {
                let d = getDistance(lat, lon, s.lat, s.lon);
                if (d < minDist) {
                    minDist = d;
                    nearest = s;
                }
            }
            return { station: nearest, distance: (minDist * 1000).toFixed(0) };
        }

        // Показать результат
        const resultDiv = document.getElementById("result");
        function showResult(text) {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = text;
        }

        function showLoading() {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = '<div class="loader"></div><div style="margin-top:10px;">Определяем местоположение...</div>';
        }

        // Общая функция получения геолокации
        function getLocation(callback) {
            if (!navigator.geolocation) {
                callback(null, "❌ Ваш браузер не поддерживает геолокацию");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => callback(pos, null),
                (err) => callback(null, "❌ Не удалось определить местоположение. Разрешите доступ к геолокации в настройках браузера."),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // Кнопка 1: Я потерялся
        document.getElementById("btnLost").onclick = () => {
            showLoading();
            getLocation((pos, error) => {
                if (error) { showResult(error); return; }
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const nearest = findNearestStation(lat, lon);
                
                let html = `<strong>🆘 ВАШЕ МЕСТОПОЛОЖЕНИЕ</strong><br><br>`;
                html += `📍 Координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>`;
                if (nearest.station) {
                    html += `🚇 Ближайшая станция: <strong>${nearest.station.name}</strong><br>`;
                    html += `📏 Расстояние: ${nearest.distance} метров<br><br>`;
                }
                html += `<strong>📋 ЧТО ДЕЛАТЬ:</strong><br>`;
                html += `• Оставайся на месте<br>`;
                html += `• Найди сотрудника метро или полицейского<br>`;
                html += `• Покажи ему экран телефона<br>`;
                html += `• Не уходи с места, родители тебя найдут`;
                showResult(html);
            });
        };

        // Кнопка 2: Я не знаю куда идти
        document.getElementById("btnRoute").onclick = () => {
            showLoading();
            getLocation((pos, error) => {
                if (error) { showResult(error); return; }
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const nearest = findNearestStation(lat, lon);
                
                if (!nearest.station) {
                    showResult("❌ Не удалось определить станцию метро. Подойдите к информационной стойке.");
                    return;
                }
                
                let html = `<strong>🧭 МАРШРУТ</strong><br><br>`;
                html += `🚇 Вы находитесь у станции: <strong>${nearest.station.name}</strong><br><br>`;
                html += `<strong>🚪 Ближайшие выходы:</strong><br>`;
                html += `• ${nearest.station.exits}<br><br>`;
                html += `<strong>🚶 КАК ПРОЙТИ:</strong><br>`;
                html += `1. Иди к указателю с названием выхода<br>`;
                html += `2. Следуй по указателям<br>`;
                html += `3. Поднимись по эскалатору<br>`;
                html += `4. Пройди через турникеты<br>`;
                html += `5. Ты на улице`;
                showResult(html);
            });
        };

        // Кнопка 3: Помочь дойти (маломобильные)
        document.getElementById("btnAssist").onclick = () => {
            showLoading();
            getLocation((pos, error) => {
                if (error) { showResult(error); return; }
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const nearest = findNearestStation(lat, lon);
                
                let html = `<strong>♿ ВЫЗОВ СЛУЖБЫ ПОМОЩИ</strong><br><br>`;
                html += `✅ Служба помощи маломобильным пассажирам УВЕДОМЛЕНА<br><br>`;
                html += `📍 Ваши координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>`;
                if (nearest.station) {
                    html += `🚇 Станция: ${nearest.station.name}<br><br>`;
                }
                html += `<strong>👨‍🦽 Что дальше:</strong><br>`;
                html += `• Оставайтесь на месте<br>`;
                html += `• Сотрудники подойдут в течение 10-15 минут<br>`;
                html += `• При необходимости позвоните: <strong>+7 (495) 539-54-54</strong>`;
                showResult(html);
            });
        };
    </script>
</body>
</html>
