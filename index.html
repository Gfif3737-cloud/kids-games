<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МетроПомощник</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a1f2e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        button {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        .btn-lost { background: #c44536; }
        .btn-route { background: #2c6e9e; }
        .btn-assist { background: #2b7a5c; }
        .result {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚇 МетроПомощник</h1>
    <p>Московский метрополитен</p>

    <button class="btn-lost" id="lostBtn">🔍 Я потерялся</button>
    <button class="btn-route" id="routeBtn">🧭 Я не знаю, куда идти</button>
    <button class="btn-assist" id="assistBtn">♿ Помочь дойти</button>

    <div id="result" class="result" style="display:none;"></div>

    <script>
        const stations = [
            { name: "Комсомольская", lat: 55.7753, lon: 37.6556, exits: ["Ленинградский вокзал", "Ярославский вокзал"] },
            { name: "Курская", lat: 55.7579, lon: 37.6580, exits: ["Курский вокзал"] },
            { name: "Киевская", lat: 55.7436, lon: 37.5665, exits: ["Киевский вокзал"] }
        ];

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function findNearestStation(lat, lon) {
            let nearest = null, minDist = Infinity;
            for (let s of stations) {
                let d = getDistance(lat, lon, s.lat, s.lon);
                if (d < minDist) { minDist = d; nearest = s; }
            }
            return nearest;
        }

        function showResult(text) {
            const div = document.getElementById("result");
            div.style.display = "block";
            div.innerHTML = text;
        }

        document.getElementById("lostBtn").onclick = () => {
            if (!navigator.geolocation) {
                showResult("❌ Геолокация не поддерживается");
                return;
            }
            showResult("📍 Определяем местоположение...");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const station = findNearestStation(lat, lon);
                    if (station) {
                        showResult(`📍 Вы рядом со станцией: <strong>${station.name}</strong><br><br>👮 Что делать:<br>• Оставайся на месте<br>• Найди сотрудника в синей форме<br>• Покажи ему этот экран`);
                    } else {
                        showResult(`📍 Ваши координаты: ${lat.toFixed(4)}, ${lon.toFixed(4)}<br><br>Обратитесь к сотруднику метро.`);
                    }
                },
                () => {
                    showResult("❌ Не удалось определить местоположение. Разрешите доступ к геолокации.");
                }
            );
        };

        document.getElementById("routeBtn").onclick = () => {
            if (!navigator.geolocation) {
                showResult("❌ Геолокация не поддерживается");
                return;
            }
            showResult("📍 Определяем местоположение...");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const station = findNearestStation(lat, lon);
                    if (station) {
                        let exits = station.exits.join(" или ");
                        showResult(`🚇 Вы на станции: <strong>${station.name}</strong><br><br>🚪 Выходы: ${exits}<br><br>Идите к указателям с названием выхода, поднимитесь по эскалатору и пройдите через турникеты.`);
                    } else {
                        showResult(`📍 Ваши координаты: ${lat.toFixed(4)}, ${lon.toFixed(4)}<br><br>Подойдите к схеме метро или спросите у сотрудника.`);
                    }
                },
                () => {
                    showResult("❌ Не удалось определить местоположение.");
                }
            );
        };

        document.getElementById("assistBtn").onclick = () => {
            if (!navigator.geolocation) {
                showResult("❌ Геолокация не поддерживается");
                return;
            }
            showResult("📍 Определяем местоположение...");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    showResult(`♿ Служба помощи маломобильным уведомлена!<br><br>📍 Ваши координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}<br><br>👨‍🦽 Сотрудники подойдут в течение 10-15 минут.<br><br>📞 Горячая линия ЦОМП: +7 (495) 539-54-54`);
                },
                () => {
                    showResult("❌ Не удалось определить местоположение. Позвоните по номеру +7 (495) 539-54-54");
                }
            );
        };
    </script>
</body>
</html>
